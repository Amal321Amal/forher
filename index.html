<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>For Angutty ❤️</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cinzel:wght@600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- ====================================== -->
<!-- GALAXY BACKGROUND -->
<!-- ====================================== -->

<div id="background">

    <div id="stars"></div>

    <div id="shootingStars"></div>

    <div id="nebula"></div>

</div>

<!-- ====================================== -->
<!-- LOADING SCREEN -->
<!-- ====================================== -->

<section id="loadingScreen">

    <div class="terminal">

        <div class="terminal-header">

            <span class="dot red"></span>

            <span class="dot yellow"></span>

            <span class="dot green"></span>

        </div>

        <div class="terminal-body">

            <h1 id="bootTitle">

                SYSTEM ONLINE

            </h1>

            <p id="bootText">

                Initializing...

            </p>

            <div class="progressBox">

                <div id="progressBar"></div>

            </div>

            <p id="statusText">

                Preparing something special...

            </p>

        </div>

    </div>

</section>

<!-- ====================================== -->
<!-- MAIN STORY -->
<!-- ====================================== -->

<main id="story">

    <div class="glassCard">

        <h1 id="sceneTitle"></h1>

        <p id="sceneText"></p>

        <div id="choices"></div>

        <button id="nextButton">

            Continue →

        </button>

    </div>

</main>

<!-- ====================================== -->
<!-- PARTICLES -->
<!-- ====================================== -->

<div id="particles"></div>

<!-- ====================================== -->
<!-- CONFETTI -->
<!-- ====================================== -->

<canvas id="confettiCanvas"></canvas>

<script src="script.js"></script>

</body>

</html>
